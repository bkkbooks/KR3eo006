body:
  text: 病後調理服食法凡一切病後將愈表裡氣血耗於外臟腑精神損於內形體虛弱倦怠少力乃其常也宜安心靜養調和脾胃為要防風寒慎起居戒腦怒節飲食忌房勞除妄想是其切要若犯之即良醫亦難奏功矣勿以身命等蜉蝣如燈蛾之撲焰自損其軀哉戒之戒之例次如下初愈務宜衣被適寒溫如太熱發渴心煩助虛熱如寒則又令外邪仍入內傷寒時疫身涼脈緩宜進青菜湯疏通餘邪如覺腹中寬爽再進陳倉米清湯以開胃中谷氣一二日後可進糜粥盞許日三四次或四五六次慎勿太過或用陳豆豉或清爽之物過口或清水煮白鯗醋點極妙再漸進活鯽魚湯調理百日方無食復勞復等症食後復發熱宜斷谷即愈服調脾胃之劑切勿用驟補熱藥須從緩處治能收全功切痛忌食豬脂濕面雞羊膩滯煎炒等物犯之復發難治中風後忌服辛散香燥等藥及豬羊鵝雞魚腥蕎麵蛋滯氣發病等物病後切忌房勞犯之舌出數寸死勞嗽發熱水腫喘急宜淡食忌鹽物瘧痢後忌飽食及香甜滑利諸血之物生冷梨瓜之類癰疽發背忌同傷寒虛損喘咳骨蒸忌用大熱溫補等藥宜服補陰藥培養真元庶幾可也産後切禁寒涼等物雖在酷暑之日亦所不宜世多誤用以致傷生特為拈出痘疹後不善調攝多致危殆因其忽略保護故也凡病後如水浸泥牆已干之後最怕重復沖激再犯不救今具食治方於下為保身者之助並利畏服藥者以便於養老慈幼云食治祕方客曰萬病皆從口入如何食反能治病耶蓋草木藥石得五行之偏氣如人之得疾因五臟有偏勝則氣血有偏傾故用偏氣之藥物治五臟偏勝之氣血使得歸其正然中病則已不可過焉過則藥又反能生病也是故飲食人賴以養者貪嗜之所以有萬病皆從口入之說亦猶是耳且五穀得五行之正氣尚有是說蓋飲養陽氣食養陰氣內經言之詳矣五穀為養五果為助血氣調和長有天命何況今人忽而不講惟知藥可治病不知飲食起居之間能自省察得以卻疾延年也古人食治之方良有深意衛生者鑑之風門蔥粥治傷風鼻塞妊娠胎動産後血暈用糯米煮粥臨熟入蔥數莖再略沸食之羊脂粥治半身不遂中風用羊脂入粳米蔥白薑椒豉煮粥日食一具十日效蒼耳粥治目暗不明及諸風鼻流清涕兼治下血痔瘡用蒼耳子五錢取汁和米三合煮食烏雞臛治中風煩熱言語祕澀或手足發熱用烏雞肉半斤蔥白一握煮熟入麻油鹽豉薑椒再煮令熟空腹食黃牛腦子酒治遠年近日偏正頭風用牛腦一個切片白芷川芎末各三錢同入瓷器內加酒煮熟乘熱食之儘量而醉醉後即臥臥醒疾若失豬胰酒治赤白癜風用豬胰一具酒浸一時飯上蒸熟食不過十具愈又方白煮豬肚一枚食之頓盡三個愈切忌房事寒門乾薑粥治一切寒冷氣鬱心痛胸腹脹滿用白米四合入乾薑良薑各一兩煮食生薑煎治反胃羸弱生薑切片麻油煎過為末煮粥調食生薑酒治霍亂轉筋入腹欲死心腹冷疼生薑三兩搗陳酒一升煮兩三沸服仍以渣貼疼處生薑醋漿治嘔吐不止生薑一兩醋漿兩合銀器煎取四合連渣嚼呷又殺腹內長蟲茱萸粥治心氣痛不止胸腹脹滿用吳茱萸二分和米煮粥食之又方川椒茶治同上丁香熟水治亦同上丁香一二粒打碎入壺傾滾水在內其香勃然大能快脾利氣定痛闢寒肉桂酒治感寒身體疼痛用辣桂末二錢溫酒調服腹痛泄瀉俗以生薑吳萸擂酒俱效如跌撲傷墜疼痛瘀血為患宜用桂枝豆蔻湯治一切冷氣心腹脹滿胸膈痞滯噦逆嘔吐泄瀉虛滑水穀不消困倦少力不思飲食用肉豆蔻仁四兩麵裹煨甘草炒一兩白麵炒四兩丁香五分鹽炒五錢共為末每服二錢沸湯點服空腹妙暑門緑豆粥解暑渴用緑豆淘淨下湯煮熟入米同煮食之緑豆酒治同上用緑豆蒸熟浸酒服又方加黃連少許桂漿解暑渴去熱生涼益氣消痰官桂末一兩白蜜二兩先以水二斗煎至一斗候冷入瓷壇中入桂蜜二味攪一二百餘遍先用油紙一層外加綿紙數層以繩封之每日去紙一重七日開之氣香味美或以蜜封置井中一日冰冷可口每服一二杯百病不作濕門薏苡粥去濕氣腫脹利腸胃功勝諸藥用薏米淘淨對配白米煮粥入白糖一二匙食郁李仁粥治水腫腹脹喘急二便不通體重痛痹轉動不能腳氣亦宜郁李仁二兩研汁和薏米五合同米煮粥食赤豆粥利小便消水腫腳氣辟邪癘赤豆淘淨同陳倉米對配煮粥空腹食赤小豆飲治水氣脹滿手足浮腫氣急煩悶赤豆三升樟柳枝一升同煮豆熟為度空心去枝取豆食渴則飲汁勿食他物自效桑皮飲治水腫腹脹喘急用桑根白皮四兩和米四合煮爛可食紫蘇粥治老人腳氣用家園紫蘇細搗入水取汁煮粥將熟加蘇子研汁攪勻食之鯉魚臛治水腫滿悶氣急不能食皮膚欲裂四肢常疼不可屈伸用鯉魚十兩蔥白一握麻子一升取汁煮作羹臛入鹽豉姜椒調和空心慢食又方鯉魚二斤陳皮二兩煮爛入青鹽少許拌勻空食蒼朮酒治諸般風濕瘡瘍腳氣下重蒼朮三十斤洗淨打碎以東流水三石浸二十日去渣以汁浸曲如家造酒法酒熟任飲不拘時忌桃李松節酒治冷風虛弱筋骨攣痛腳氣緩痹一方松葉酒治同造同用松節煮汁同曲米釀酒飲松針搗煎亦可白石英酒治風濕周痹肢節濕痛腎虛耳聾白石英磁石煅醋淬七次各五兩絹袋盛浸酒中五六日溫飲如少加酒盡其力可也逡巡酒補虛益氣去一切風痹濕氣耐老延年久服自效造法三月三日收桃花三兩三錢五月五日收馬蘭花五兩五錢六月六日收脂麻花六兩六錢九月九日收黃甘菊九兩九錢已上俱陰乾十二月八日取臘水三斗待春分取桃仁四十九粒去皮尖白麵十斤同前花和作曲紙包陰乾四十九日聽用欲造酒煮糯米飯一升白水一瓶曲一丸用曲一塊封良久酒即成矣如淡再加曲一丸五加皮酒去一切風濕痿痹壯筋骨填精髓五加皮洗淨去梗煎汁和麵米釀成飲之或切碎袋盛浸酒煮飲或加當歸牛膝地榆等仙靈脾酒治偏風不遂強筋壯骨仙靈脾一斤袋盛浸無灰酒二斗封固三日飲之女貞皮酒治風虛補腰膝女貞皮切片浸酒煮飲之薏苡酒去風濕強筋骨健脾胃用薏米粉同曲米釀之或將袋盛煮酒飲之亦可海藻酒治癭氣用海藻一斤洗浸無灰酒日夜細飲黃藥酒治諸癭氣用萬州黃藥切片一斤袋盛浸酒煮飲燥門生地粥滋陰潤肺及妊娠胎漏下血目赤生地搗汁米二合煮熟入汁一合調勻再煮加熟蜜少許空心服麻蘇粥治産後血暈汗多便閉老人血虛風閉胸腹不快噁心吐逆用家園蘇子麻子各五錢水淘淨微炒研如泥水濾取汁入米煮粥食之百部酒治久近一切咳嗽百部切炒袋盛浸酒頻頻飲之蜜酒孫真人治風疹風癬肌膚燥癢沙蜜一斤糯米飯一斤曲五兩熟水五升同入瓶內封七日成酒尋常以蜜入酒代之人乳粥潤肺通腸補虛養血用壯實無疾女人乳汁俟粥半熟去湯下乳代湯煮熟置碗中加酥油一二錢調勻食槐枝酒治大麻痿痹槐枝煮油如常釀酒法巨勝酒治風虛痹弱腰膝疼痛巨勝子二升炒薏米二升生地半斤袋盛浸酒飲蠶砂酒治風緩麻痹諸節不遂腹內宿痛原蠶砂炒黃袋盛浸酒服紫酒治中風口偏不語角弓反張鼓脹不消雞屎白一升炒焦投酒中待紫色頻飲火門甘蔗粥治咳嗽虛熱口乾舌燥涕吐稠黏用甘蔗取汁三碗入米三合煮粥空心食之竹瀝粥治痰火如神如常煮粥法以竹瀝下半杯食之緑豆酒治陰虛痰火諸疾用緑豆山藥各二兩黃怕牛膝元參沙參白芍山梔天麥冬花粉蜂蜜各一兩半當歸一兩二錢甘草三錢以好酒浸之飲黃連酒有火症及發熱不宜飲酒蓋酒性大熱助病為瘧多致不治倘遇喜慶事必欲飲用此以黃連緑豆各一錢枸杞三錢浸酒飲黃柏酒有相火而好飲者宜如生瘡疥及肌膚不澤用黃柏一兩豬胰四兩生浸飲一味豬胰浸酒令婦人多乳催乳更妙小麥湯治五淋不止身體壯熱小便滿悶小麥一升通草二兩水煎不時可啜自效甘豆湯治一切煩渴二便澀少及風熱入腎黑豆二合甘草二錢生薑七斤水煎服藕蜜膏主虛熱口渴大便燥結小便祕痛藕汁蜜各四升生地汁一升和勻慢火熬成膏每服半匙口含噙化不時用忌煎炒竹葉粥治膈上風熱頭目赤痛止渴清心竹葉五十片石膏二兩水三碗煎至兩碗澄清去渣入米三合煮粥加白沙糖二錢食四汁膏清痰降火下氣止血雪梨甘蔗鮮藕薄荷葉各等分搗汁入瓦鍋文火熬膏頻頻飲如無梨秋白亦可調理脾胃門凡病後脾胃弱肌肉瘦擇相宜者食之以助藥力絶妙人參粥治翻胃吐酸及病後脾弱用粟米一合煮粥入人參末薑汁各五錢和勻空心食門冬粥治咳嗽及翻胃用麥門冬浸汁和米煮粥妊婦食之亦宜粟米粥治脾胃虛弱嘔吐不食漸加尪羸粟米白曲等分煮粥空心食極養胃氣一人病淋性不可服藥豫令日啖此粥絶去他味旬日減月餘痊飲食妙法理脾糕治老人小兒脾泄水瀉用松花一升百合蓮肉山藥薏米芡實白蒺藜各末一升粳米粉一斗二升糯米粉三升砂糖一斤拌勻蒸熟炙乾食之一方加砂仁末一兩蘇蜜煎治噎病吐逆飲食不進紫蘇葉二兩白蜜薑汁各五合和勻微火煎沸每服半匙空心細咽姜橘湯治胸滿悶結飲食不下用生薑二兩陳皮一兩空心水煎服芡實粥益精氣強智力聰耳目用芡實去殼三合新者研如膏陳者作粉和粳米三合煮粥食蓮子粥治同上健脾胃止泄痢蓮肉一兩去衣煮爛研細入糯米三合煮粥食鹿豆粥益精補脾又治霍亂吐瀉白扁豆半斤先煮豆爛去皮入人參二錢下米煮粥山藥粥補下元固腸止瀉懷慶山藥為末四分配六分米煮食茯苓粥治脾虛泄瀉又治不寐粳米二合茯苓末一兩煮好再下苓末一兩再煮爛食蘿蔔粥消食利膈蘿蔔大者一個配米二合煮食胡蘿蔔粥寬中下氣煮法同上蘇子粥下氣利膈紫蘇子微炒一合研汁去渣粥好下汁再煮食之茴香粥和胃治疝用小茴香炒煎湯去渣入米煮粥食胡椒粥吳茱萸粥並治心腹疼痛煮法同上蓮肉糕治病後胃弱不消水穀蓮肉粳米各炒四兩茯苓二兩共為末砂糖調和每用兩許白湯送下豆麥粥治飲食不住口仍易飢餓近似中消用緑豆糯米小麥各一升炒熟為末每用末一升滾水調服清米湯治泄瀉用蚤米半升東壁土一兩吳萸三錢同炒香熟去土萸取米煎湯飲米飲治咽中作哽下食則塞反胃不止用杵頭糠炒一兩煮米飲調勻空心食黃雞餛飩治脾胃虛弱少食痿黃益臟腑悅顏色用黃雞肉五兩白麵二兩蔥白二合切作餛飩入咸椒豉和之煮熟空心食松子粥潤心肺和大腸同米煮粥食炒麵入粥同食止白痢燒鹽入粥同食止血痢氣門杏仁粥治上氣咳嗽扁杏仁去皮尖二兩研如泥或加豬肺同米三合煮食萊蔔子粥治氣喘用萊蔔子即蘿蔔子三合煮粥食豬腎粥治腳氣頑痹行履不便疼痛不止豬腎兩枚切碎蔥白五莖米三合同煮臨熟加鹽豉椒調和食之羊腎粥鹿腎粥法同治同雞肝粥羊肝粥並補肝明目煮法同上鹿膠粥治諸虛助元陽煮粥入膠熔化即是虎骨酒治臂脛疼痛歷節風腎虛膀胱氣痛虎脛骨一具炙黃打碎同曲米如常造酒飲霹靂酒治疝氣偏墜婦女崩中下血胎産不下用鐵錘火燒赤淬入酒中飲之血門阿膠粥止血補虛厚腸胃又治胎動不安糯米煮粥臨熟入阿膠末一兩和勻食桑耳粥治五痔下血常煩熱羸瘦桑耳二兩取汁和粳米三合煮熟空心食槐茶治風熱下血明目益氣止牙疼利臟腑順氣道嫩槐葉蒸熟曬乾每日煎如茶法柏茶止血滋陰側柏葉曬乾煎湯代茶飲醍醐酒治鼻衄不止蘿蔔自然汁入好酒一半和勻溫服韭汁酒治赤痢又治心痛以其散氣行血連白韭菜一把去梢取汁和酒一杯溫服馬齒莧羹治下痢赤白水穀不化腹痛馬齒莧菜煮熟入鹽豉或薑醋拌勻食之豬胰片治肺損嗽血咯血豬胰切片煮熟蘸薏仁末空心服如肺癰米飲調下羊肺肝腎治吐血咯血損傷肺腎及肝隨臟引用或肺或肝或腎煮熟切片蘸白芨末食欲試血從何經來用水一碗吐入水中浮者肺也沉者腎也半浮半沉者肝也痰門蘇子酒主消痰下氣潤肺止咳家紫蘇子炒研絹袋盛之浸酒中日日飲之陰虛門忌酒芡實粥見前脾胃門枸杞粥治肝家火旺血衰益腎氣甘州枸杞一合米三合煮食又方採鮮葉如常煮粥食入鹽少許空腹食佳鰻魚臛補虛勞殺蟲治肛門腫痛痔久不愈鰻魚細切煮作臛入鹽豉薑椒空心食牛乳粥補虛羸如常粥內加入牛乳和勻食羊肝粥雞肝粥雞汁粥並治虛勞陽虛門羊肉羹治下焦虛冷小便頻數羊肉四兩羊肺一具細切入鹽豉煮作羹空心食胡桃粥治陽虛腰疼及石淋五痔胡桃肉煮粥食又浸酒方加小茴香杜仲補骨脂桂花酒釀成玉色香味超然非世間物也羊羔酒大補元氣健脾胃益腰腎宣和化成殿方用糯米一石如常浸漿取蒸再入肥嫩羊肉七斤曲十四兩杏仁一斤同煮爛連汁拌飯加入木香一兩銼同釀勿犯水十日熟諸虛門參歸腰子治心氣虛損自汗人參五錢當歸四兩豬腎一枚細切同煮食之以汁送下或用山藥搗丸如桐子大每服三十丸空心溫酒下多服乃佳煨腎法治腎虛腰痛豬腎一枚薄切五七片以椒鹽淹去腥水以杜仲末三錢在內包以薄荷外加濕紙置火內煨熟酒下如脾虛加補骨脂炒末二錢獵腎酒治同上用童便二鍾好酒一鍾以瓷瓶貯之取豬腎一對入內黃泥封固日晚時以慢火養熟至中夜止五更初以火溫之發瓶飲酒食腰子病篤者只一月效平日虛怯尤宜食絶勝金石草木之藥也豬肚方治虛羸乏氣人參五錢乾薑胡桃各二錢蔥白七莖糯米三合為末入豬肚內扎緊勿以泄氣煮爛空心服以好酒一二杯送之牛乳方老人最宜補心脈安心神長肌肉為人子者常當供之或為乳餅乳腐較諸物勝山藥酒補虛損益顏色又治下焦虛冷小便頻數用酥一匙於鐺中熔化入山藥末熬令香入酒一杯調勻空心飲生栗方治腳氣及腎氣損腳膝無力用生栗蒸熟風乾每日空心食十枚效甚水芝丸補五臟諸虛蓮肉一斤去心入豬肚內扎定煮爛搗丸如桐子大每三四十丸空心酒下以上諸方其治病之功勝於藥石人但知藥能治病而不知食能治病孫真人有言曰醫者先曉病原知其所犯以食治之食療不愈然後議藥不特老人小兒相宜凡頤養及久病厭藥者亦未為不可也
