body:
  text: 卷下服藥須知夫病之所由來因放逸其心逆於生樂以精神殉智巧以憂患殉得失以勞苦殉禮節以身世殉財利四殉不置心為之病也極力勞形躁暴氣逆當風飲酒食嗜辛鹹肝為之病矣飲食失節溫涼失度久坐久臥大飽大飢脾為之病矣呼叫過常辨爭陪答冒犯寒暄恣食酸鹹肺為之病矣久坐濕地強力涉遠縱欲勞形三田漏溢腎為之病矣五病即作故未老而羸未羸而病病至則重重則必斃嗚呼是皆弗思而自取之也今既病矣而後藥之得非臨渴掘井乎然必以慎起居戒暴怒簡言語清心寡營輕得失收視聽節飲食忌肥濃炙煿生冷凡食勿頓而多任可少而頻食不欲急急則傷脾法宜細嚼緩咽勿太熱勿太冷又不得雜雜則物性或有相反則脾與胃不大可慮哉苟能慎之服藥自效設仍率性任情不守戒忌豈特藥力無功而其疾更劇矣是不可不慎煎藥有法慎用水按方書所載長流水即千里水但當取其流長而來遠耳不可泥於千里之外者以取其來遠通達用以煎治手足四肢病及通利二便之藥也急流水湍上峻急之流水也以其急速而達下取以煎利二便及足脛之風濕藥也順流水其性順而下流故亦取治下焦腰膝之病及二便之藥也逆流水慢流洄瀾之水也以其逆而倒流取其調和發吐痰飲之藥也半天河水即長桑君授扁鵲飲以上池之水乃竹籬藩頭管內所盛之水也取其自天而降未受下流重濁之氣故可以煉還丹調仙藥之用春雨水立春日空中以器盛接之水其性始得春升生髮之氣可以煎補中氣及清氣不升之劑古方謂婦人無子者於立春日清晨以器盛空中之雨水或是日百草曉露之水夫妻各飲一杯還房當即有孕取其資始資生發育萬物之意耳秋露水其性稟收斂肅殺之氣取煎祛祟之藥及調敷蟲疥癬瘡風癩之用井華水清晨井中第一汲者其天一真元之氣浮結水面取煎滋陰之劑及修煉丹藥之用新汲水井中新汲未入缸甕者取其無所混濁用以煎藥為潔甘瀾水以器盛水又以器揚濯之使其珠沫盈於水面約以百次為度取其性變溫柔能理傷寒陰症潦水即無根水山谷中無人處新坎中水也取其性止而不流且有土氣清者可煎調脾胃補中氣之劑冬霜水陰盛則露結而為霜霜能殺物性隨時異也解酒毒治熱病收霜法雞羽刷貯瓶密封候用一方治寒熱症秋霜一錢熱酒送下奇效如神臘雪水冬至後第三戊為臘其水解時疫丹石毒煎茶煮粥止消渴洗目赤如神及調和殺蟲藥用陰陽水即生熟水新汲水合百沸湯和勻是也入燒鹽飲之消醉飽過度霍亂肚脹者飲一二升吐出痰食即痊凡霍亂嘔吐不能令納食其勢危者先飲數口即定菊英水蜀中有長壽源其源多菊花而流水皆菊花香居人飲其水者壽皆二三百歲故淵明好植菊花日採其華英浸水烹茶期延年也夫本草雖有諸水之名而未及其用今特表而出之按千金方云煎人參鬚用流水用止水即不驗今甚有宿水煎藥不惟無功恐有蟲毒陰氣所侵益蒙其害即滾湯停宿者浴面無顏色洗身成癬已上諸水各有所宜臨用之際宜細擇焉慎火候按方書所載桑柴火桑木能利關節養津液得火則良抱朴子云一切仙藥不得桑煎不服桑乃箕星之精能助藥力除風寒痹痛久服不患風疾故也櫟炭火宜煅煉一切金石之藥以其堅也金粟火即粟米殼也煅煉丹藥用烰炭火宜烹煎焙炙百藥丸散白炭誤吞金銀銅鐵在腹燒紅急為末煎湯呷之甚者刮末一錢井水調服未效再服又解水銀輕粉毒石炭今西北所燒之煤即是不入藥用蘆荻火竹火宜煎一切滋補藥按火有文武從容和緩不疾不徐文火也恐熾焰沸騰則藥汁易涸氣味不全耳並用紙蘸水封器口煎之如煎探吐痰飲之劑當用武火取其急速而發吐之也慎煎器必用砂銚瓦罐如富貴家淨銀之器煎之更妙切忌油穢腥氣銅錫鐵鍋或煎過他藥者必滌潔淨器口用紙蘸水封之慎煎藥之人有等魯莽者不按水火率意煎熬或藥汁太多而背地傾藏或過煎太少而私攙茶水供應病人惟圖了事必擇謹慎能識火候者或親信骨肉按法煎造其去渣必用新絹濾淨取清汁服慎服藥凡病在胸膈以上者先食而後藥病在心腹以下者先藥而後食病在四肢血脈者宜飢食而在旦病在骨髓者宜飽食而在夜在上不厭頻而少在下不厭頻而多少服則滋潤於上多服即峻補於下其藥氣與穀氣不欲相逢食氣下則服藥藥氣退則進食有食前食後服宜審此意服藥忌食凡服藥不可雜食肥膩魚酢陳羹犬豕諸肉及胡荽生蒜蔥韭生菜瓜果生冷滑滯之物並忌見死尸産婦淹穢等事有蒼朮忌桃李雀肉青魚蛤菘菜有黃連胡黃連豕肉冷水並忌有甘草忌豕肉海菜菘菜有桔梗遠志烏梅忌豕肉冷水生蔥有地黃何首烏忌一切血蔥蒜菜蔔有半夏菖蒲補骨脂忌羊肉飴糖有細辛常山忌生菜生蔥有丹參茯神茯苓忌一切酸味物並醋有牡丹皮忌胡荽蒜有仙茅牛膝忌牛乳羊肉有蒼耳忌豕肉有吳茱萸忌豕心肺豕肉慈姑有荊芥忌河豚一切魚蟹有二冬忌鯉魚鯽魚有鱉甲忌莧菜有澤瀉忌海蛤有枸杞萆薢忌牛肉牛乳有肉桂蜂蜜忌蔥有厚朴萆麻忌炒豆有巴豆忌冷水有薄荷忌鱉肉有紫蘇丹參龍骨忌鯉魚有商陸忌犬肉有當歸忌濕面有附子烏頭天雄忌豉汁稷米有土茯苓威靈仙忌茶麵湯有陽起雲母鍾乳礬石硇砂並忌羊血飲食禁忌節要不可同食食豬肉忌薑羊肝豬肝忌魚酢豬心肺忌飴羊肉忌梅子酢羊心肝忌椒筍犬肉忌蒜魚牛肉忌薑栗子牛肝牛乳忌魚雞肉雞子同忌蒜蔥芥李鴨子忌李鵪鶉忌菌木耳雀肉忌李醬鯉魚忌雞豬肝葵菜鯽魚忌豬肝蒜雞糖魚酢忌緑豆醬黃魚忌蕎麥鱸魚忌乳酪鱘魚忌干筍蟹忌柿橘棗蝦子忌雞豕李子忌蜜棗忌蔥魚韭忌牛肉蜜梅子忌豕肉胡荽炒豆忌豕肉莧菜忌鱉楊梅忌蔥蕎麥忌豕羊雉肉黃魚黍米忌牛肉葵菜蜜緑豆忌棐子能殺人魚酢病有十失驕恣率性不遵戒忌一也輕命重財治療不早二也聽信巫禱廣行殺戮不信醫藥三也諱疾試醫言不由中四也不善擇醫信人譭譽或從蓍卜五也急欲速效旦暮更張雜劑亂投六也索即寫方制炮失宜私自加減七也侍奉不得人煎丸失法怠不精詳八也寢興不適飲食無度九也過服湯藥蕩滌腸胃十也病有八不治室家乖戾處事不和動成荊棘一也恣縱慆淫不自珍重二也憂思想慕得失縈懷三也今日預愁明日一年營計百年四也煩躁暴戾不自寬慰五也窘若拘囚無瀟灑志六也怨天尤人廣生懊惱七也以死為苦難割難捨八也卻病十要一要靜坐觀空萬緣放下當知四大原從假合勿認此身為久安長住之所戰戰以為憂也二要煩惱現前以死喻之勿以爭長較短三要常將不如我者巧自寬解勿以不適生嗔四要造物勞我以生遇病卻閒反生慶幸五要深信因果或者夙業難逃卻歡喜領受勿生嗟怨六要室家和睦無交謫之言入耳七要起居務適毋強飲食寧節毋多八要嚴防嗜欲攻心風露侵衣九要常自觀察克治病之根本處十要覓高朋良友講開懷出世之言或對竹木魚鳥相親翛然自得皆卻病法也病有七失不可治病有七失不可治者失於不審失於不慎失於不信失於怠忽過時失於不擇醫失於不辨藥失於自立意見應補責醫以瀉畏功責醫欲補應針欲艾應灼欲砭七者之中有一於此即為難治非止醫家之罪實病家之自誤也矧有醫不慈仁病者猜鄙二理交馳於病為害者不少由是言之醫者不可不慈仁病者不可多猜鄙如犯之則招禍在醫者當以救濟為心在病家務以精誠篤摯為念各盡其極乃治病求愈之大端也老人病不同治法常見年高疾患將同少年混投湯藥妄行針灸務欲速愈殊不知老年之人血氣已衰精神減耗至於視聽不至聰明手足舉動不隨其志身體勞倦頭目昏眩宿疾時發或祕或泄或冷或熱皆老人之常也勿緊用針藥急求痊愈往往因此別緻危殆且攻病之藥或汗或吐或解或利緣衰老之人不同年少年少者真氣壯盛雖汗吐轉利未致危殆其老弱者汗之則陽氣泄吐之則胃氣逆下之則元氣脫立致不可救此養老之大忌也大率老人藥餌止用扶持只可溫平順氣進食補虛中和之劑不可用市肆購買他人惠送未識方味者與之服餌切須詳審若有宿疾時發則隨其疾狀用和平湯劑調順三朝五日自然痊退惟是調停飲食隨其食性變饌治之此最為良法也治婦人病有不能盡法之弊治婦人疾有不能盡聖人之法者今富貴之家居奧室之中處幃幔之內甚又以帛幪手臂既不能行望色之神又不能殫切脈之巧四者有二缺焉黃帝曰凡治病察其形氣色澤形氣相得謂之可治色澤以浮謂之易已形氣相失謂之難治色夭不澤謂之難已又曰診病之道觀人勇怯骨肉皮膚能知其情以為診法若病人脈病不相應既不得見其形醫者止據脈供藥其可得乎如此言之烏能盡其術哉此醫家之公患世不能革醫者不得不盡理質問以憑調治病家見其所問煩逮意其脈道不精往往得藥不服似此甚多扁鵲見齊侯之色尚不肯信況其不得見者乎嗟哉妄庸議病世有病人親朋故舊交遊來問疾者其人曾不經一事未讀一方自誇了了談說異端或言是虛或言是實或云是風或云是氣紛紛繆說種種不同使亂病人心意不知孰是遷延已久時不待人欻然致禍各自走散設有明醫識病深淺探究方書熟知本草看病不爾大誤人事何況妄議者乎古方無妄用鄱陽周順醫有十全之功云古方如聖惠千金外臺祕要所論病原脈症及針灸法皆不可廢然處方分劑與今大異不深究其旨者謹勿妄用有人得目疾用古方治之目遂突出又有婦人因産病用外臺祕要坐導方其後反得惡露之疾終身不瘥曾有士人得腳弱病方書羅列積藥如山而疾益甚余今悉屏去但用杉木為桶盛水濯足並令排樟腦於兩股間以腳繃系定月餘安健如初南方多此疾不可不知順固名醫語必不妄故録於此草藥不可妄用甲志云紹興十九年三月英州僧希賜往州南三十里洸口掃塔有客船自番禺至舟中士人攜一僕病腳弱不能行舟師憫之曰吾有一藥治此病如神餌之而瘥者不可勝計既賽廟畢飲胙頗醉乃入山求得草漬酒授病者今天未明服之如其言藥入口即呻吟云腸胃如刀割截痛遲明而死士人以咎舟師舟師恚曰何有此即取昨夕所餘藥自漬酒服之不逾時亦死蓋此山多斷腸草人誤食之輒死舟師所取藥為根蔓所纏醉不暇擇徑投酒中以此致禍則知草藥不可妄用也真菊野菊蜀人多種菊以苗可以菜花可以藥園圃悉能植之今人多采野菊供藥肆頗有大誤真菊延齡野菊殺人如張華言黃精益壽鉤吻殺人形類相似之誤有如此服餌忌羊血服餌之家忌食羊血雖服餌數十年一食則前功盡喪以其能解藥力如此論婦人病有不同治法孫真人云寧醫十男子莫醫一婦人以嗜欲多於丈夫故感病倍於男子蓋其慈戀愛憎嫉妬憂患染著堅牢情不自抑以此成疾非外感六氣必內傷七情之所致也七情之病不可醫誠以情想內結自無而有思慮過當多致勞損是以釋氏稱說酢梅口中水出想蹈懸崖足心酸楚大都如此若非寬緩情意改易心志則雖金丹大藥亦不能已蓋病出於五內無有已期藥力不可及也法當令病者存想以攝心抑情以養性葛仙翁曰凡婦人病兼治其憂恚令寬其思慮則疾無不愈矣凡人在病中百念灰冷雖有富貴欲享不能反羡貧賤而健者人能於平日無病時作是想頭病從何來及一切名利得失恩怨亦自淡然用藥例丸散湯膏各有所宜藥有宜丸宜散者宜水煎者宜酒漬者宜煎膏者亦有一物兼宜者亦有不可入湯酒者並隨藥性不可過越湯者蕩也煎成清汁是也去大病用之散者散也研成細末是也丸者緩也作為丸粒也不能速效舒緩而治之也漬之者以酒浸藥也有宜酒浸以助其力如當歸地黃知母黃柏陰寒之氣味假酒力而行氣血也有用藥銼細如法煮酒密封早晚頻飲以行經絡或補或攻漸以取效是也細末者不循經絡止去胃中及腑臟之積及治肺疾咳嗽為宜氣味厚者白湯調氣味薄者煎之和渣服丸治下焦之病者極大而光且圓治中焦者次之治上焦者極小麵糊者取其遲化直至下焦或酒取其散或醋取其收如半夏南星及利濕者以薑汁稀糊丸取其易化也湯泡蒸餅尤易化滴水亦然煉蜜丸者取其遲化而氣循經絡也蠟丸者取其能達下焦而治腸澼等疾凡修合丸劑用蜜只用蜜用飴只用飴勿相雜用且如丸藥用蠟取其固護藥氣欲其經久不失味力且過膈關而作效也今若投蜜相和雖易為丸然下咽亦即散化如何得至腸中若或有毒藥不宜在上化豈徒無益而反為害全非用蠟之本意凡煉蜜宜先掠去沫令熬色微黃試水不散再熬一二沸作丸則收潮而不黏成塊也冬月煉蜜煉時要加二杯水為妙衍義云每蜜一斤只煉得十二兩是其度數也和藥末要乘極滾時和之臼內搗千百杵自然軟熟容易作條好丸也凡為末先須細切曬燥退冷搗之有宜合搗者其滋潤之藥如天麥冬生熟地黃當歸輩先切曬之獨搗或以慢火隔紙焙燥退冷搗之則為細末若入衆藥少停回潤則和之不勻也凡濕藥燥皆大耗蝕當先增分兩待燥稱之乃准其湯酒中不須如此凡合丸藥用蜜絹令細篩散藥尤宜精細若搗丸必於石臼中杵千百過色理和同為佳凡欲浸酒皆須細切上絹袋盛乃入酒密封隨寒暑日數視其濃烈便可漉出不須待酒盡也渣則曝燥微搗更漬飲之亦可為散服凡合膏子須令膏少之料先淹浸先煎其汁乃下有膏之料煮時當杖以三上三下以泄其火氣勿令沸騰不妨旋取藥汁渣須再煮務令力盡而已然後漸漸慢火收厚如飴加煉蜜收貯瓷瓶出火氣七日二七日聽用凡煎摩貼之膏或醋或酒或油須令淹浸然後煎熬用杖三上三下以泄其熱勢令藥味得出上之使咂咂沸下之要沸靜良久乃上之如有蔥白及姜在內以漸焦為度如有附子木鱉者亦令焦黃勿令枯黑濾膏必以新布若是可服之膏渣亦可酒煮飲之可摩之膏渣亦可敷亦欲兼盡其藥力也凡湯膏中用諸石藥皆細研之以新絹裹之納中衍義云石藥入散如硃砂鍾乳之類用水研乳極細必要二三日乃已以水漂澄極細方可服餌豈但研細絹裹為是凡草葉之藥如柏葉荷葉茅根薊根十灰散類必要焦枯用器蓋在地上出火性存本性倘如死灰則白無效矣凡有脂膏如桃杏麻仁等須另末旋次入衆味合研則勻凡湯劑中用一切完物俱破殼研之如豆蔻蘇子益智骨脂之類不則如米之在殼雖煮之終日米終不熟職是故也凡用香燥如木香沉香砂仁豆蔻不宜久煎點泡尤妙藥品制度法藥之制度食品之調和也食品之加五味非調和不能足其味次藥有良毒不藉修治豈能奏效假如芩連知柏用治頭面手足皮膚者須酒炒以其性沉寒借酒力可上騰也用治中焦酒洗下焦生用黃連去痰火薑汁拌炒去胃火和土炒治吞酸同吳茱萸炒此各從其宜也大黃用行太陽經酒浸陽明經酒洗況其性寒力猛氣弱之人須用煨蒸否則必寒傷胃也地黃知母下焦藥也用之須用酒浸亦恐寒胃地黃用治中風非薑汁浸炒恐泥膈也苦參龍膽酒浸者制其苦寒也當歸防己天麻酒浸者助發散之意也川烏天雄附子其性劣灰中慢慢炮之裂去皮臍及尖再以童便浸一宿制其燥毒也半夏湯泡七次南星水浸俱於臘月冰凍二三宿去其燥性更妙用治風痰俱以薑汁浸一宿南星治驚癇以黃牛膽釀陰乾取壯其膽氣也吳茱萸味惡須湯泡七次麻黃先煮兩沸去沫免令人煩悶山梔仁用瀉陰火炒令色變水蛭虻蟲斑蝥乾漆非煙盡不能去其毒生則令人吐逆不已巴豆性最急劣有大毒不去油莫用大戟芫花甘遂商陸其性亦暴非妙用峻利不已蒼朮氣烈非泔浸經宿燥性不減凡用金石並子仁之類須各另研細方可入劑但制度得法而藥能施功矣余見今人索方入市希圖省儉不顧有誤不惟炮製失宜抑且真僞未明多少不合全失君臣佐使用藥之法大非求藥治病之心使反力致誤伊誰之咎耶凡事修合必須選料制度一如後法務在至誠毋得忽也用火煅者必於地上取去火毒為妙倘隨症自有製法不拘此例人參去蘆人乳拌蒸生地酒洗熟地酒洗焙二門冬水潤去心蒼朮米泔浸炒白朮米泔浸蒸切片蜜水拌炒褐色黃耆蜜炙遠志甘草湯浸透去梗焙升麻柴胡忌火菖蒲去須焙葳蕤蜜水蒸山藥蒸苡米炒當歸去根酒洗二芍酒拌炒木香生用理氣煨用止泄甘草生用瀉火熟用補中石斛酒浸蒸牛膝川芎酒淨知母去毛酒炒五味嗽生用補焙用貝母去心焙紫菀水淨蜜水焙澤瀉去毛酒焙續斷酒炒甘菊去蒂車前酒焙研萆薢酒浸焙苦參泔水浸蒸曬白芷焙防風去蘆並叉者金銀花去枝葉茺蔚子忌鐵麻黃去根節黃柏去皮酒炒黃芩酒蒸天麻酒浸濕紙包煨乾葛生用墜胎熟解酒毒龍膽酒炒香附醋酒童便可制何首烏米泔浸黑豆蒸桔梗略焙白豆蔻去衣微炒草豆蔻同上白附炮去皮臍草果去殼肉豆蔻麵裹煨忌鐵砂仁去殼炒研玄胡索莪朮酒炒三稜醋炒款冬花去枝蜜水炒百部去心酒洗焙旋覆花去蒂焙兜鈴水淨枳殼麩炒半夏薑湯泡煮透南星炮去皮臍冬月研末入牛膽掛風處蒺藜酒炒去刺大黃酒蒸用天雄附子童便浸去皮切四片另再用童便加甘草防風煮乾為度巴戟酒浸焙杜仲酥炙仙茅泔浸去赤水淫羊藿羊油拌炒肉蓯蓉酒洗去甲菟絲子酒煮打作餅曬為末補骨脂酒炒益智鹽水炒研覆盆子去蒂酒炒骨碎補去毛蜜蒸狗脊去毛酒炒商陸黑豆拌蒸芫花醋煮曬大戟水煮去骨甘遂麵裹煨郁李仁去皮研如膏常山去蘆酒炒萆麻子去殼續隨子研去油葫蘆巴淘淨酒焙牛蒡酒炒研桑白皮蜜水炒山梔子炒黑乾薑炮厚朴薑汁炒桃杏仁湯泡去皮尖研神麯炒研麥芽炒萊蔔子炒研白芥子炒研紫蘇子炒研蓮子去心炒山茱萸去核焙吳茱萸去閉口鹽湯泡三次焙蜀椒去合口核炒訶子蒸去核焙青蒿童便浸一宿曬枇杷葉胃病薑汁炙肺病蜜炙去毛椿樗白皮醋炙雷丸酒蒸去皮蜜蒙花酒潤焙麻仁炒研扁豆炒乳香沒藥箬上烘出油同燈心研之則能細山楂去核生薑去皮熱留皮寒乾漆炒盡煙為度粟殼醋炒韭子炒蔥蒜忌蜜黑白醜酒蒸研蘇合香酒蒸另研丁香忌火水蛭全蠍炒去毒烏藥酒炒大腹皮水洗曬酸棗仁生醒寐熟安神柏子仁炒牡丹皮酒炒地榆忌火白芨略焙決明子炒研蟬蛻去翅足洗斑蝥去頭足翅同大米炒葶藶子同米炒連翹酒炒白殭蠶米泔浸經宿待涎浮水面取起焙乾去絲及黑口研穿山甲土炙酒炙研代赭煅醋淬水飛雄黃硃砂另研水飛石膏煅研赤白石脂火煅研水飛用自然銅磁石煅醋淬九次細研水飛滑石研水飛爐甘石青礞石花蕊石伏龍肝火煅研水飛陽起石火煅酒淬七次水飛白礬煅龍骨火煅水飛酒煮阿膠蛤粉炒石決明鹽水煮研水飛牡蠣火煅童便淬研珍珠絹包入豆腐中煮一炷香研鱉甲去肋酥炙鹿茸烙去毛酥炙虎脛骨酥炙五靈脂酒飛去沙龜甲酒浸炙墨火煅研發入瓦罐中鹽泥封固煅存性齒火煅水飛海螵蛸炙桑螵蛸蒸透再焙昆布水淨海藻水淨焙緋丹湯泡去黃水炒令紫色研石硫用豬大腸盛之水煮三日夜以皂角湯淘去黑水再以紫背浮萍同煮消其火毒畏細辛醋及諸般血香附醋酒童便可制土硫黃辛熱腥臭止可入瘡科外治不堪服餌
