body:
  text: 卷上勿藥須知臞仙曰古神聖之醫能療人之心預使不至於有疾今之醫者惟知療人之疾而不知療人之心是猶捨本而逐末也不窮其源而攻其流欲求疾愈安可得乎殊不知病由心生孽由人作佛氏謂一切唯心造良不誣矣所以人之七情內起正性顛倒以致大疾纏身誠非醫藥所能治療蓋藥能治五行生剋之色身不能治無形之七情能治七情所傷之氣血不能治七情忽起忽滅動靜無端之變幻故臞仙又曰醫不入刑官之家藥不療不仁者之疾蓋福有所主禍有所司報復之機無一不驗因有天刑之疾自戕之疾其天刑之疾由夙世今生所積過愆天地譴之以致斯疾此孽源於心也其自戕之疾者風寒暑濕之所感酒色性氣之所傷六慾七情生於內陰陽二氣攻於外此病生於心也仙經曰煉精化氣煉氣化神煉神還虛噫將從何處煉乎總不出於心耳故凡思慮傷心憂悲傷肺忿怒傷肝飲食傷脾淫欲傷腎藥之所治只有一半其一半則全不繫藥力唯要在心藥也或曰何謂心藥引林鑑堂詩曰自家心病自家知起念還當把念醫只是心生心作病心安那有病來時此之謂心藥以心藥治七情內起之病此之謂療心予考歷代醫書之盛汗牛充棟反復詳明其要主於卻疾然內經有一言可以蔽之曰不治已病治未病是也治有病不若治於無病療身不若療心吾以為使人療尤不若先自療也療心法言素問天真論曰恬淡虛無真氣從之精神內守病安從來老子曰人生以百年為限節護乃至千歲如膏之小炷與大炷耳人大言我小語人多煩我少記人悸怖我不怒淡然無為神氣自滿此長生之藥劉河間曰形者生之舍也氣者生之元也神者生之制也形以氣充氣耗形病神依氣立氣合神存修真之士法於陰陽和於術數持滿御神專氣抱一以神為車以氣為馬神氣相合可以長生又曰全生之術形氣貴乎安安則有倫而不亂精神貴乎保保則有要而不耗故保養之道初不離乎形氣精神達摩曰心不緣境住在本源意不流散守於內息神不外役免於勞傷人知心即氣之主氣即形之根形者氣之宅神形之具令人相因而立若一事有失即不合於至理可能久立焉老子曰不見可欲使心不亂直指曰清謂清其心源靜謂靜其氣海心源清則外事不能擾性定而神明氣海靜則邪欲不能作精全而復實指歸曰遊心於虛靜結志於微妙委慮於無欲指歸於無為故能達生延命與道為久妙真經曰人常失道非道失人人常去生非生去人故養生者慎勿失道為道者慎勿失生使道與生相守生與道相保元道真經曰生可冀也死可畏也草木根生去土則死魚鱉沉生去水則死人以形生去氣則死故聖人知氣之所在以為身寶仙經曰精氣神為內三寶耳目口為外三寶常令內三寶不逐物而流外三寶不誘中而擾又曰毋勞爾形毋搖爾精歸心靜默可以長生定觀經曰惟令定心之上豁然無覆定心之下曠然無塞舊孽日銷新孽不造無所掛礙迥脫塵病又曰唯滅動心不滅照心但凝空心不凝住心重陽祖師曰老人於十二時中行住坐臥一切動中要把心似泰山不搖不動謹守四門眼耳鼻口不令內入外出此名養壽要緊真人大計曰奢懶者壽慳靳者夭放散劬勞之異也田夫壽膏粱夭嗜欲多少之驗也處士少疾遊子多患事務簡煩之殊也故俗人競利道士罕營唐書曰多記損心多言耗氣心氣內損形神外散初雖不覺久則為弊元始真經曰喜怒損性哀樂傷神性損則害生故養性以全氣保神以安身氣全體平身安神逸此全生之訣也洞神經曰養生以不損為延年之術不損以為有補衛生之經天真論曰外不勞形於事內無思想之患以恬愉為務以自得為功形體不敝精神不散莊子曰能遵生者雖富貴不以養傷身雖貧賤不以利累形又曰吾生也有涯而智也無涯以有涯逐無涯殆矣已而為智者殆而已矣秋聲賦云奈何思其力之所不及憂其智之所不能宜其渥然丹者為槁木黟然黑者為星星此士大夫通患也又曰百憂感其心萬事勞其形有動於中必搖其精人常有多思多憂之患方壯遽老方老遽衰反此亦長生之法孫思邈曰多思則神殆多念則智散多欲則智昏多事則勞形多言則氣乏多笑則傷藏多愁則心懾多樂則語溢多喜則妄錯昏亂多怒則百節不定小有經曰才所不勝而強思之傷也力所不任而強舉之傷也深憂而不解重喜而不釋皆傷也淮南子曰太喜墜陽太怒破陰是以君子有節焉玄珠曰起居不節用力過度則脈絡傷傷陽則衄血傷陰則下血書曰行走勿語傷氣語多則住而再語笑多則腎轉腰疼神仙傳曰養壽之道但莫傷之而已素問曰食飲有節起居有常不妄作勞故能形與神俱而盡終其天年真訓曰眼者身之鏡耳者體之牖視多則鏡昏聽眾則牖閉面者神之庭發者腦之華心悲則面焦腦減則發素精者體之神明者神之寶勞多則精散營竟則明消妙真經曰視過其目者明不居聽過其耳者精不守愛過其心者神不居牽過於利者動則懼真誥曰鏡以照面智以照心鏡明則塵垢不染智明則邪惡不生陰符經曰淫聲美色破骨之斧鋸也世之人不能秉靈燭以照迷情持慧劍以割愛欲流浪生死之海害生於恩也河圖帝視萌曰侮天地者凶順天時者吉春夏樂山高處秋冬居卑深藏吉利多福壽考無窮西山記曰一體之盈虛消息皆通乎天地應乎萬類和之於始和之於終靜神災想生之道也衛生訣云凡人一日一夜一萬三千五百息減之一息則寒加之一息則熱臟腑不和諸疾生焉故元氣在保養穀神在守護呂洞賓曰寡言語以養氣寡思慮以養神寡嗜欲以養精精生氣氣生神神自靈也是故精絕則氣絕氣絕則命絕也是故精氣神人身之內三寶也齊丘子曰喬松所以能凌霜雪者藏正氣也美玉所以能犯烈火者蓄至精也是以大人晝運靈旗夜錄神芝覺所不覺思所不思可以冬御風而不寒夏御火而不熱故君子藏正氣可以遠鬼神伏奸佞蓄至精者可以保生靈躋福壽是以貴乎養氣也素問曰謹和五味骨正筋柔氣血以流腠理以密長有天命又曰食風者靈而延壽算食谷者多智而勞形神食草者癡愚而力足食肉者勇鄙而多嗔服氣者常存而得道傳曰雜食者百病妖邪所鍾所食愈少心愈開年愈益所食愈多心愈塞年愈損焉所以服氣者千年不死故身飛於天食谷者千百皆死故形歸於地白玉蟾曰薄滋味以養氣去嗔怒以養性處卑下以養德守清靜以養道學山曰食飲有節脾土不泄調息寡言肺金自全動靜以敬心火自定寵辱不驚肝木自寧恬然無欲腎水自足益州老人曰凡欲身之無病必須先正其心使其心不亂求心不狂思不貪嗜欲不著迷惑則心君泰然矣心君泰然則百骸四體雖有病不難治療獨此心一動百患為招即扁鵲華佗在旁亦無所措手乎林鑑堂安心詩我有靈丹一小錠能醫四海群迷病些兒吞下體安然管取延年兼接命安心心法有誰知卻把無形妙藥醫醫得此心能不病翻身跳入太虛時念雜由來業障多憧憧擾擾竟如何驅魔自存玄微訣引入堯天安樂窩人有二心方顯念念無二心始為人人心無二渾無念念絕悠然見太清這也了時那也了紛紛攘攘皆分曉云開萬里見清光明月一輪圓皎皎四海遨遊養浩然心連碧水水連天津頭自存漁郎問洞里桃花日日鮮性理曰夫人之心皆明鏡也聖人特不塵之耳夫人之心皆止水也聖人特不波之耳又朱晦菴曰學者常要提醒此心惺惺不昧如日中天群邪自息同一旨也養心說夫心者萬法之宗一身之主生死之本善惡之源與天地而可通為神明之主宰而病否之所由系也蓋一念萌動於中六識流轉於外不趨乎善則五內顛倒大疾纏身若夫達士則不然一真澄湛萬禍消除老子曰夫人神好清而人擾之人心好靜而欲牽之常能遣其欲而心自靜澄其心而神自清自然六慾不生三毒消滅盂子曰養心莫善於寡欲所以妄想一病神仙莫醫正心之人鬼神亦憚養與不養故也目無妄視耳無妄聽口無妄言心無妄動貪嗔癡愛是非人我一切放下未事不可先迎遇事不宜過擾既事不可留住聽其自來應以自然信其自去忿懥恐懼好樂憂患皆得其正此養之法也養肝說夫肝者魂之處也其竅在目其位在震通於春氣主春升發動之令也然木能動風故經曰諸風掉眩皆屬於肝又曰陽氣者煩勞則張精絕闢積於夏使人煎厥設氣方升而煩勞太過則氣張於外精絕於內春而邪辟之氣積久不散至夏未痊則火旺而真陰如煎火炎而虛氣逆上故曰煎厥按脈解論曰肝氣失治善怒者名日煎厥戒怒養陽使生生之氣相生於無窮又曰大怒則形氣絕而血菀於上使人薄厥菀結也怒氣傷肝肝為血海怒則氣上氣厥則絕所以血菀上焦相迫曰薄氣逆曰厥氣血懼亂故曰薄厥積於上者勢必厥而吐也薄厥者氣血之多而盛者也所以肝藏血血和則體澤血衰則枯槁故養肝之要在乎戒念是攝生之第一法也養脾說脾者後天之本人身之倉廩也脾應中宮之土土為萬物之母如嬰兒初生一日不再食則飢七日不食則腸胃涸絕而死經曰安穀則昌絕谷則亡蓋穀氣入胃灑陳六腑而氣至和調五臟而血生而人資以為生者也然土惡濕而喜燥飲不可過過則濕而不健食不可過過則壅滯而難化病由是生矣故飲食所以養生而貪嚼無厭亦能害生物理論曰穀氣勝元氣其人肥而不壽養性之術常令穀氣少則病不生穀氣且然矧五味饜飫為為五內害乎甚而廣搜珍錯爭尚新奇恐其性味良毒與人臟腑宜忌尤未可曉故西方聖人使我戒殺茹素本無異道人能戒殺則性慈而善念舉茹素則心清而腸胃厚無嗔無貪罔不由此外考禽獸肉食谷者宜人不可不慎養肺說肺者臟之長也心之華蓋也其藏魄其主氣統領一身之氣者也經曰有所失亡所求不得則發肺鳴鳴則肺熱葉焦充之則耐寒暑傷之則百邪易侵隨事痿矣故怒則氣上喜則氣緩悲則氣消恐則氣下驚則氣亂勞則氣耗思則氣結七情之害皆氣主之也直養無害而後得其所以浩然者天地可塞人之氣與天地之氣可一也道氣可配人之氣與天地之氣可通也先王以至日閉關養其微也慎言語節飲食防其耗也養腎說腎者先天之本藏精與志之宅也仙經曰借問如何是玄牝嬰兒初生先兩腎又曰玄牝之門是為天地根是故人未有此身先生兩腎蓋嬰兒未成先結胞胎其象中空一莖透起形加蓮蕊一莖即臍帶連蕊即兩腎也為五臟六腑之本十二脈之根呼吸之主三焦之原人資以為始豈非天地之根乎而命寓焉者故又曰命門天一生水故曰坎水夫人慾念一起熾若炎火水火相剋則水熱火寒而靈臺之焰藉此以滅矣使水先枯涸而木無所養則肝病火炎則土燥而脾敗脾敗則肺金無資咳嗽之症成矣所謂五行受傷大本已去欲求長生豈可得乎莊子曰人之大可畏者衽席之間不知戒者故也養生之要首先寡欲嗟乎元氣有限情欲無窮內經曰以酒為漿以妄為常醉以入房以竭其精此當戒也然人之有欲如樹之有蠹蠹甚則木折欲熾則身亡仙經曰無勞爾形無搖爾精無使爾思慮營營可以長生智者鑑之齋說夫世之持齋往往以齋之說為誤何也茹素而已不復知有齋之實事意謂茹素可以弭災集福卻病延年則謬矣玉華子曰齋者齊也齊其心而潔其體也豈僅茹素而已所謂齊心者澹志寡營輕得失勤內省遠葷酒潔其體者不履邪徑不視惡色不聽淫聲不為物誘入室閉戶燒香靜坐方可謂之齋也誠能如是則身中之神明自安升降不礙可以卻病可以長生可以迪福弭罪食忌說太乙真人七禁文其六曰美飲食養胃氣彭鶴林雲夫脾為臟胃為腑脾胃二氣互相表裡胃為水穀之海主納水穀脾在中央磨而消之化為氣血以灌溉臟腑榮養周身所繫最重修養之士不可不美其飲食以調之所謂美者非水陸畢具異品珍饈之謂也要在乎生冷勿食粗硬勿食勿強食勿強飲先飢而食食不過飽先渴而飲飲不過多孔子曰食饐而餲魚餒而肉敗不食色惡不食臭惡不食失飪不食不時不食凡此者皆損胃氣非惟致病亦乃傷生欲希長年斯宜深戒而奉老慈幼與觀頤者審之食飲以宜飲食之宜當候已飢而進食食不厭細嚼仍候焦渴而引飲飲不厭細呷毋待飢甚而食食勿過飽時覺渴甚而飲飲勿過多食不厭精細飲不厭溫熱五味毋令勝穀味肉味毋令勝食氣食必先食熱後食冷居室安處論天隱子曰吾謂安處者非華堂邃宇重裀廣榻之謂也在乎南面而坐東首而寢陰陽適中明暗相半屋無高高則陽盛而明多屋無卑卑則陰盛而暗多故明多則傷魄暗多則傷魂人之魂陽而魄陰苟傷明暗則疾病生焉此所謂居處之室尚使之然況天地之氣有亢陽之攻肌淫陰之侵體豈可不防慎哉修身之士倘不法此非安處之道曰吾所居室四邊皆窗戶遇風即合風息即開吾所居室前簾後屏太明即下簾以和其內映太暗則捲簾以通其外耀內以安心外以安目心目俱安則身安矣明暗且然況太多思慮太多情欲豈能安其內外哉居處宜忌說保生要錄曰人之家室土厚水深居之不疾凡人居處隨其方所皆欲土厚水深土欲堅潤而黃水欲甘美而清常坐之處令其四面周密勿令小有細隙致風得入人不易知其傷人最重初時不覺久能中人夫風者天地之氣也能生成萬物亦能損人有正有邪故耳初入腠理漸至肌膚內傳經脈達臟腑傳變既深為患不小故素問云夫上古聖人之教下民也皆謂之虛邪賊風避之有時又養生書云避風如避箭若盛暑所居兩頭通屋弄堂夾道風回涼爽其為害尤甚養生者當慎之寢室宜忌說凡人臥床常令高則地氣不及鬼吹不幹鬼氣侵人常因地氣上逆耳人臥室宇當令潔淨淨則受靈氣不潔則受故氣故氣之亂人室宇所為不成所依不立即一身亦爾當常令沐浴潔淨臥時祝法黃素四十四方經云夜寢欲閤眼時以手撫心三過閉目微祝曰太靈九宮太乙守房百神安位魂魄和同長生不死塞滅邪凶咒畢而寢比名九宮隱祝寢魂之法常能行之使人魂魄安寧永獲貞吉睡訣西山蔡季通云睡側而屈覺正而伸早晚以待先睡心後睡眼朱晦菴謂未發之妙千金方云半醉酒獨自宿軟枕頭暖蓋足能息心自瞑目陸平泉云每夜欲睡必走千步始寢論語曰食不語寢不言寢臥不得多言笑五臟如鍾磐不懸則不可發聲伏氣有三種眠法病龍眠屈其膝也寒猿眠抱其膝也龜鶴眠踵其膝也孫真人衛生歌天地之間人為貴頭象天兮足象地父母遺體宜保之箕疇五福壽為最衛生切要知三戒大怒大欲並大醉三者若還有一焉須防損失真元氣欲求長生先戒性火不出兮神自定木還去火不成灰人能戒性方延命貪欲無窮志卻精用心不已走元神勞形散盡中和氣更復何能保此身心若太費費則竭形若太勞勞則歇神若太傷傷則虛氣若太損損則絕世人慾知衛生道喜樂有常嗔怒少心誠意正思慮除順理修身去煩惱春噓明月木扶肝夏至呵心火自閒秋呬定收金肺潤冬吹腎水得平安三焦嘻卻除煩熱四季常呼脾化餐切忌出聲聞口耳其功尤勝保神丹發宜多梳氣宜煉齒宜頻叩津宜咽子欲不死修崑崙雙手揩摩常在面春月少酸宜食甘冬月宜苦不宜咸夏要增辛減卻苦秋辛可省便加酸季月可鹹甘略戒自然五臟保平安若能全減身康健滋味偏多多病難春寒莫放綿衣薄夏月多汗須換著秋冬衣冷漸加添莫待病生才服藥惟有夏月難調理內有伏陰忌涼水瓜桃生冷忌少餐免致秋來生瘧痢君子之人守齋戒心旺腎衰宜切記常令充實勿空虛日食須當去油膩太飽傷神飢傷胃太渴傷血並傷氣飢餐渴飲勿太過免致膨脝傷心肺醉後強飲飽強食未有此生不成疾人資飲食以養身去其甚者自安適食後須行百步多手摩臍腹食消磨夜半雲根灌清水丹田濁氣切須呵飲酒可以陶性情太飲過多防有病肺為華蓋倘受傷咳嗽勞精能損命慎勿將鹽去點茶分明引賊入其家下焦虛冷令人瘦傷腎傷脾防病加坐臥切防腦後風腦內入風人不壽更兼醉飽臥風中風才一入成災咎雁有序兮犬有義黑鯉朝北知臣禮人無禮義反食之天地神明俱不喜養體須當節五辛五辛不節損元神莫教引動虛陽發精竭神枯定喪身不問在家並在外若遇迅雷風雨至急須端肅敬天威靜室收心須少避恩愛牽纏不自由利名縈絆幾時休放寬些子自家福免致中年早白頭頂天立地非容易飽食暖衣寧不愧思量無以報洪恩早暮焚香謝天地身安壽永事如何胸次平夷積善多惜命惜身兼惜氣請君熟玩衛生歌真西山衛生歌萬物惟人為最貴百歲光陰如旅寄自非留意修養中未免疾苦為身累何必餐霞餌大藥妄意延令等龜鶴但於飲食嗜欲間去其甚者將安樂食後徐行百步多兩手摩脅並胸腹須臾轉手摩腎堂謂之運動水與土仰面常呵三四呵自然食毒氣消磨醉眠飽臥俱無益渴飲飢餐尤戒多食不欲粗並欲速寧可少餐相接續若教一頓飽充腸損氣傷脾非爾福生冷黏膩筋韌物自死牲牢皆勿食饅頭閉氣宜少餐生膾偏招脾胃疾酢醬胎卵兼油膩陳臭醃𨢇盡陰類老弱若欲更食之是藉寇兵毋以異炙煿之物須冷吃否則傷齒傷血脈晚食常宜申酉時向夜徒勞滯胸膈飲酒莫教令大醉大醉傷神損心志酒渴飲水並啜茶腰腳自茲成自墜常聞避風如避箭坐臥須當預防患況因食後汗孔開風才一入成癱瘓不問四時俱暖酒太熱太冷莫入口五味偏多不益人恐隨臟腑成災疚視聽行坐不可久五勞七傷從此有四肢亦欲得小勞譬如戶樞終不朽臥不厭縮覺即舒飽宜沐浴飢宜梳梳多浴少益心目默寢暗眠神晏如四時惟夏難調攝伏陰在內腸易滑補腎湯丸不可無食物稍冷休餔啜心旺腎衰何所忌特忌疏通泄精氣寢處尤宜嚴密間宴居靜慮和心氣沐浴盥漱皆暖水簟涼枕冷俱弗宜瓜茄生冷不宜人豈獨秋來作瘧痢伏陽在內冬三月切忌汗多泄精氣陰霧之中莫遠行暴雨迅雷宜速避道家更有頤生旨第一戒人少嗔恚秋冬日出始穿衣春夏雞鳴宜早起子後寅前睡覺來瞑目叩齒二七回吸新吐故毋令誤咽漱玉泉還養胎指摩手心熨兩眼仍更揩摩額與面中指時時擦鼻莖左右耳根筌數遍更能幹浴一身間按䏶時須扭兩肩縱有風勞諸濕氣何憂腰背復拘攣噓呵呼嘻吹及呬行氣之人分六字果能依用口訣中新舊有疴皆可治聲色雖云屬少年稍知撙節乃無愆閉精息氣宜聞早莫使羽苞火中燃有能操履常方正於利無貪名不競縱向歌中未盡行可保周身亦無病養神氣銘神者氣之子氣者神之母形者神之室氣清則神暢氣濁則神昏氣亂則神勞氣衰則神去神去則形腐人以氣為道道以氣為生生道兩存則長生久視孫真人養生銘怒甚偏傷氣思多太損神神疲心易役氣弱病來侵勿使悲歡極常令飲食均再三防夜醉第一戒晨嗔亥寢鳴天鼓晨興漱玉津妖邪難犯己神氣自全身若要無諸病常當節五辛安神宜悅樂惜氣保和純壽天休論命修形在本人若能遵此理平地可朝真謹疾箴凡人富貴名利勿強求之而況此身父母之所遺才情意氣勿競爭之而況此身妻之所仰身之柔脆非木與石傷之七情報以百疾疾之既來有術奚施疾之未來有術不知我明告子子尚聽之色之悅目惟男女之欲思所以遠之如脫桎梏味之爽口惟飲食之欲思所以禁之如畏鳩毒多言則傷氣欲養氣者言不費思則損血欲養血者思不越憂不可積樂不可縱形不可太勞神不可太用凡此數言終身宜誦勿藥真言云獨宿之妙不但老年少壯亦當如此日間紛擾心神散亂全賴夜間休息以復元氣若日內心猿意馬狂妄馳驅至夜又醉飽而恣情縱欲不自愛惜其精神血氣何能堪此導引卻病法老子曰天有三寶日月星人有三寶精氣神此其旨可得而知也余自少慕道夙有因緣幸遇高賢異士得讀古聖法言乃知性命之理簡易淵微舍精氣神則別無了道之門而老子一言固己悉之矣人自離母腹三元真氣日可生髮後為情欲所蔽不知保養斫喪者多於是古聖傳授教人修補之法呼吸吐納存神運想閉息按摩雖非大道然能勤行積久乃可卻病延年若夫虛勞內損痼疾經年即扁鵲盧公難於措手苟能積氣開關決有回生之效久之則任督二脈交通水升火降乃成既濟從前受病之根斬刈無遺嗣後真元之氣蒸蒸不竭然勿謂草木無功遂委之命也哉余雖不敏嘗事於斯以謝奇疴諦信專行功臻旦夕敢以告之同志內養下手訣易曰一闔一闢謂之變往來不窮謂之通闔闢往來無非道也人生以氣為本以息為元以心為根以腎為蒂天地相去八萬四千里人心與腎相去八寸四分此腎是內腎臍下一寸三分是也中有一脈以通天息之浮沉息總百脈一呼則百脈皆開一吸則百脈皆合天地造化流行亦不出於闔闢二字人之呼吸即天地之闔闢也是乃出於心腎之間以應天地陰陽升降之理人能知此養以自然則氣血從軌無俟乎搬運之煩百病何自而生如有病能知此而調之則不治而自卻矣下手之訣必先均調呼吸均調呼吸先須屏絕外緣順溫涼之宜明燥濕之異明窗淨几滌慮清心閉目端坐叩齒三十六遍以集心神然後以大拇指背於手掌心勞宮穴處摩令極熱用拭目之大小眥各九遍並擦鼻之兩旁各九遍又以兩手摩令熱閉口鼻氣然後摩面不俱遍數以多為上名真人起居法次以舌舐上齶攪口中華池上下取津漱煉百次候水澄清一口分作三次汩然嚥下名曰赤龍取水又曰玉液煉己法最能灌溉五臟光澤面目潤肺止嗽其效若神行持時不必拘定子午每於夜半後生氣時行之或睡覺時皆妙如日中閒暇時亦可運氣法凡運氣法當閉目靜坐鼻吸清氣降至丹田轉過尾閭隨即提氣如忍大便狀自夾脊雙關透上直至泥丸轉下鵲橋汩然嚥下仍歸丹田初行功時焚香一炷為度漸增三炷功行七日而止凡臥病者宜用厚褥綿被暖帳重衣不論寒暑初行功三日發大汗以攻陰邪之氣進熱粥以為表汗之資渴則漱玉泉以咽之飢則炊熱粥以食之飢然後食不拘餐數如是衣不解帶能一月則在床三五七年癱勞鼓膈等症皆可刻期而愈患在上身收氣當存想其處患在下身收氣亦存想其處放氣則歸於丹田患在遍身當分經絡屬上屬下運法亦如之女子行功先提水門後及穀道運法如前愚按人之氣即天地之氣故天氣不交於地乾坤或幾乎息矣人之所以當運其氣者亦體天地交泰之義也先提穀道勿使泄也自背至頂使相交也想丹田使歸根也不惟有療病之功抑且多延年之效何況於無病乎況微病乎是名曰修養固精法金丹秘訣云一擦一兜左右換手九九之數真陽不走每於戍亥二時陰旺陽衰之候宜解衣閉息一手兜外腎一手擦臍下左右換手各兜擦九九之數仍盤膝端坐手齒俱固先提玉莖如忍小便狀想我身中元精自尾閭升上直至泥丸復過鵲橋降至丹田每行七次精自固矣愚按精者人身真元之氣五官百骸之主而神魂附之以生者也夫神猶火也精猶油也油盡則燈滅精竭則神亡故精由氣生神由精附固精之法宜急講也半月固精久行愈佳定神法人身入神出入固無定在迨病者窮思極想又有甚焉若能行功則神隨氣轉不慮其他出否則難乎其有定在也故恆時必須常想玄關思睡必須常想鼻準如是則神不外馳而定矣愚按神外無心心外無道道即神之主心即神之宅也然心外無道故收放心即神定而道在孟子謂學問之道無他求其放心而已夫放心而知求則志氣清明義理昭著此定神之功驗也今之養病者日思丹田思鼻準亦收放心之法也不曰收放心而曰定神蓋遊心千里無有定在此皆神之外出故曰定神以上三條乃卻病修養之大綱外有導引等法詳具於後十二段動功叩齒一齒為筋骨之餘常宜叩擊使筋骨活動心神清爽每次叩擊三十六數咽津二將舌舐上齶久則津生滿口便當咽之嚥下嘓然有聲使灌溉五臟降火甚捷咽數以多為妙浴面三將兩手自相摩熱覆面擦之如浴面之狀則鬚髮不白即升冠鬢不斑之法顏如童矣鳴天鼓四將兩手掌掩兩耳竅先以第二指壓中指彈腦後骨上左右各二十四次去頭腦疾運膏肓五此穴在背上第四椎下脊兩旁各三寸藥力所不到將兩肩扭轉二七次治一身諸疾托天六以兩手握拳以鼻收氣運至泥丸即向天托起隨放左右膝上每行三次去胸腹中邪氣左右開弓七此法要閉氣將左手伸直右手作攀弓狀以兩目看右手左右各三次瀉三焦火可以去臂腋風邪積氣摩丹田八法將左手托腎囊右手摩丹田三十六次然後左手轉換如前法暖腎補精擦內腎穴九此法要閉氣將兩手搓熱向背後擦腎堂及近脊命門穴左右各三十六次擦湧泉穴十法用左手把住左腳以右手擦左腳心左右交換各三十六次摩夾脊穴十一此穴在背脊之下大便之上統會一身之氣血運之大有益並可療痔灑腿十二足不運則氣血不和行走不能爽快須將左足立定右足提起灑七次左右交換如前右十二段乃運導按摩之法古聖相傳卻病延年明白顯易盡人可行莊子曰呼吸吐納熊經鳥伸為壽而已矣此導引之士養形之人彭祖壽考者之所好也由是傳之至今其法自修養家書及醫經所載種數頗多又節取要約切近者十六則合前十二段參之各法大概備矣凡行功每於子後寅前此時氣清腹虛行之有效先須兩目垂簾披衣端坐兩手握固趺坐當以左足後跟曲頂腎莖根下動處不令精竅漏泄耳兩手當屈兩大指抵食指根餘四指捻定大指是為兩手握固然後叩齒三十通即以兩手抱項左右宛轉二十四次此可去兩脅積聚之邪復以兩手相叉虛空托天反手按頂二十四此可除胸膈中病復以兩手心掩兩耳卻以第二指彈腦後枕骨二十四此可除風池邪氣復以兩手相促按左膝左捩身按右膝右捩身各二十四此可去肝家風邪復以兩手一向前一向後如挽五石弓狀二十四次此可去臂腋積邪復大坐展兩手扭項左右反顧肩膊隨二十四次此可去脾胃積邪復以兩手握固並拄兩肋擺撼兩肩二十四此可去腰脅間之風邪復以兩手交捶臂及膊反捶背上連腰股各十四此可去四肢胸臆之邪復大坐斜身偏倚兩手齊向上如排天狀二十四此可去肺家積聚之邪復大坐伸足以兩手向前低頭扳足十二次卻鉤所伸足屈在膝上按摩二十四此可去心包絡間邪氣復以兩手據地縮身曲脊向上十二舉此可去心肝二經積邪復以起立據床拔身向背後視左右各二十四此可去腎間風邪復起立徐行兩手握固左足前踏左手擺向前右手擺向後右足前踏右手擺向前左手擺向後二十四此可去兩肩俞之邪復以手向背上相捉低身徐徐宛轉二十四此可去兩肋之邪復以足相扭而行前進十數步後退十數復高坐伸足將兩足扭向內復扭向外各二十四此兩條可去兩膝兩足間風邪行此十六節訖復端坐垂簾握固冥心以舌舐上齶攪取華池神水漱三十六次作嘓嘓聲嚥下復閉氣想丹田之火自下而上遍燒身體內外蒸熱乃止愚按老子導引四十二勢婆羅門導引十二勢赤松子導引十八勢鍾離引八勢胡見素五熟導引法十二勢在諸法中頗為妙解然撮其功要不過於此學者能日行一二遍久久體健身輕百邪皆除不復疲倦矣四時攝生篇凡人在氣交之中呼吸出入皆接天地之氣故風寒暑濕四時之暴戾偶一中人壯者氣行自愈怯者則留而為病宜隨時加攝使陰陽中度是謂先幾防於未病春風陽氣閉藏於冬者漸發於外故宜發散以暢陽氣內經曰春三月此謂發陳天地以生萬物以榮夜臥早起廣步於庭被髮緩形以使志生生而勿殺予而勿奪賞而勿罰此春氣之應養生之道也逆之則傷肝夏為寒變故人當二月以來摘取東引桃枝並葉各一握水三碗煎取兩碗空心服之即吐卻心膈痰飲宿熱春深稍宜和平將息綿衣晚脫不可令背寒寒即傷肺鼻塞咳嗽如覺熱即去之冷則加之加減俱要早起之時若於食後日中防恐感冒風寒春不可衣薄令人傷寒霍亂消渴頭痛春凍未泮衣欲下厚而上薄夏三月人身陽氣發外伏陰在內是精神疏泄之時特忌下利以泄陰氣內經曰夏三月此謂蕃秀天地氣交萬物華實夜臥早起無厭於日使志無怒使英華成實使氣得泄若愛在外此夏氣之應養長之道也逆之則傷心秋為痎瘧故人常宜宴居靜坐節減飲食嗜欲調和心志此時心旺腎衰精化為水至秋乃凝尤須保嗇以固陰氣常宜食熱物使腹溫暖如爪果生冷冰水冷淘豆粉蜂蜜尤不可食食多秋時必患瘧痢勿以冷水沐浴並浴面及背使人得虛熱目病筋脈厥逆霍亂陰黃等疾勿當風臥勿眠中令人扇汗出毫孔開風邪易入犯之患風痹不仁手足不遂言語蹇澀年壯或不即病已種病矣氣衰者未有不桴鼓相應者酒後尤當禁之秋三月陽氣當斂不宜吐及發汗犯之令人臟腑消爍內經曰秋三月此謂容平天氣以急地氣以明早臥早起與雞俱興使志安寧以緩秋形收斂神氣使秋氣平無外其志使肺氣清此秋氣之應養收之道也逆之則傷肺冬為飧泄若知夏時多食瓜果涼物宜以童便二碗大腹檳榔五枚細切水煎八分生薑汁一分和雪水三分作兩空早服瀉兩三行一夏所食冷物及膀胱宿水悉為驅逐不能為患雖老年者亦宜服如小心加慎飲食者可不必也瀉後以薤白粥同羊腎空心服之勝如補劑冬三月天地閉氣血藏伏陽在內心膈多熱切忌發汗以泄陽氣內經曰冬三月謂之閉藏水冰地坼無擾乎陽早臥晚起必待日光使志若伏若匿若有私意若己有得去寒就溫無泄皮膚使氣亟奪此冬氣之應養藏之道也逆之則傷腎春為痿厥故人當服浸酒藥以迎陽氣雖然亦不可過暖綿衣當晚著使漸漸加厚即大冷不宜向火烘炙恐損目且手足心能引火入內令人心臟燥血液耗衣服亦不太炙冬月天寒陽氣內藏若加以炙衣重裘向火醉酒則陽太甚矣如遇春寒閉塞之久不與發散至春夏之交陰氣既入不能攝運陽氣致有時行熱症甚而譫妄狂越皆由冬月不善保陰之故務宜自愛寒熱適中此為至要乃攝生之大法也十二時無病法潔一室穴南牖八窗通明勿多陳列玩器引亂心目設廣榻長几各一筆硯焚楚旁設小几一掛字畫一幅頻換几上置得意書一二部古帖一本香爐一茶具全心目間常要一塵不染醜寅時精氣發生之候勿濃睡擁衾坐床呵氣一二口以出濁氣將兩手搓熱擦鼻兩旁及熨兩目五七遍更將兩耳揉卷向前後五七遍以兩手抱腦手心恰掩兩耳用食指彈中指擊腦後各二十四左右聳身舒臂作開弓勢五七遍後以兩股伸縮五七遍叩齒七七數漱津滿口以意送下丹田作三口咽清五臟火少息卯見晨光量寒溫穿衣服起坐明窗下進百滾白湯一甌勿飲茶櫛發百下使疏風散火明目去腦熱盥漱畢早宜粥宜淡素飽摩腹徐行五六十步取酒一壺放案頭如出門先飲一二杯昔有三人皆冒重霧行一病一死一無恙或問故無恙者曰我飲酒病者食死者空腹是以知酒力辟邪最勝不出門或倦則浮白以助其氣辰巳二時或課兒業或理家政就事歡然勿以小故動氣杖入園林督園丁種植蔬果芟草灌花蒔藥歸來入室閉目定神咽津約十數口蓋亥字以來真氣至巳午而微宜用調息以養之午餐量腹而入食宜美美非水陸畢具異品殊珍柳公度年八十九嘗語人曰我不以脾胃熟生物暖冷物軟硬物不生不冷不硬美也又勿強食當飢而食食勿過飽食畢起行百步摩腹又轉手摩腎堂令熱使水土運動汲水煎茶飲適可勿過多未時就書案或讀快書怡悅神氣或吟古詩暢發悠情或知己偶聚談勿及閫勿及權勢勿臧否人物勿爭辨是非當持寡言養氣之法或共知己閒行百餘步不衫不履頹然自放勿從勞苦殉禮節申時點心用粉面一二物或果品一二物弄筆臨古帖撫古琴倦即止酉時宜晚餐勿遲量飢飽勿過小飲勿醉陶然而已千金方云半醉酒獨自宿軟枕頭暖蓋足言最有味課子孫一日程如法即止勿苛戌時篝燈熱湯濯足降火除濕冷茶漱口滌一日飲食之毒默坐日間看書得意處復取閱之勿多閱多傷目亦勿多思鄭漢奉曰思慮之害甚於酒色思慮多則心火上炎火炎則腎水下涸心腎不交人理絕矣故少思以寧心更闌方就寢湧泉二穴精氣所生之地寢時宜擦千遍榻前宜燒蒼朮諸香以闢穢氣及諸不詳亥子時安睡以培元氣身必欲側屈上一足先睡心後睡眼勿想過去未來人我等事惟以一善為念則怪夢不生如此御氣調神方為自愛其寶靜功六字卻病法六字出息治病之旨常道從正變道從權噓應肝春行之肝病行之呵應心夏行之心病行之呼應脾四季行之脾病行之呬應肺秋行之肺病行之吹應腎冬行之腎病行之噫應三焦熱病行之上六字訣道藏玉軸經云言世人五臟六腑之氣因五味熏灼又被七情六慾所亂積久成患以致百骸受病故太上憫之以六字氣訣治五臟六腑之病其法行時宜靜室中暖帳厚褥盤足趺坐將前動功略行一次初學靜功恐血脈不利故先行動功後及靜功若七日後不必行動功行動功畢即閉固耳目口齒存想吾身要身似冰壺心如秋月良久待其呼吸和血脈定然後口中微放濁氣一二口然後照前節令行之假如春月須低聲念噓字不可令耳聞聞即氣粗粗恐氣泄耳放噓字氣盡即以鼻收清氣入於本經仍及丹田一收一放各二十四或三十六余仿此乃時令運行之常道也假如秋月患目疾應乎肝當行噓字又如春患虛黃當行呼字此乃權變病應之法也獨肺部之疾肺本主氣不得行此法宜專行咽津功夫降火甚捷凡修此道須擇子日子時起首二十七日為期如耳聾虛勞臌膈之症頓然自愈行之既久腹中自聞漉漉有聲內視自有一種景象百病除而精神充矣至於煉精化氣爍氣化神煉神還虛則又向上功夫茲不具述念六字口訣歌肝若噓時目睜開肺如呬氣雙手擎心呵頂上連叉手腎吹抱取膝頭平脾病呼時須撮口三焦客熱臥嘻寧四季卻病六字決春噓明目大扶肝夏至呵心火自閒秋呬定知肺金潤冬吹惟令腎中安三焦嘻卻除煩熱四季常呼脾化餐切忌出聲聞口耳其功尤勝保神丹調息調息一法貫徹三教大之可以入道小用亦可以養生靜功之最上一乘法也故迦文垂教以視鼻端白數出入息為止觀初門莊子南華經曰至人之息以踵大易隨卦曰君子以嚮晦入宴息王龍溪曰古之至人有息無睡故曰嚮晦入宴息宴息之法當嚮晦時耳無聞目無見四體無動心無思慮如種火相似元天元神元氣停育相抱真意綿綿老子曰綿綿若存是也其開合自然與虛空同體故能與虛空同壽也世人終日營營精神困敗藉此夜間一睡始彀日間之用不能調之一點光明盡被後天塵濁所蔽是謂陽陷於陰也調息之法不拘時候平身端坐解衣緩帶務令適然口中舌攪數次微微吐出濁氣不令有聲鼻中微微納之或三五遍二七遍有津嚥下叩齒數通舌抵上齶唇齒相著兩目垂簾令朧朧然漸次調息不喘不粗或數息出或數息入從一至十從十至百攝心在數勿令散亂如心息相依雜念不生則止勿數任其自然坐久愈妙若欲起身須徐徐舒放手足勿得遽起能勤行之靜中光景種種奇特直可明心見性不但養身全生而已出入綿綿若存若亡神氣相依是為真息息息歸根自能奪天地之造化長生不死之妙道也蘇子瞻養生頌云已飢方食未飽先止散步逍遙務令腹空當腹空時即便入室不拘晝夜坐臥自便唯在攝身使如木偶常自念言我今此身若少動搖如毫髮許便墜地獄如商君法如孫武令事在必行有死無犯又用佛言及老子曰視鼻端白數出入息綿綿若存用之不勤數至數百此身寂然此身兀然與空虛等不煩禁制自然不動數至數千或不能數則有一法強名曰隨與息俱出復與俱入隨之不已一旦自住不出不入忽覺此息從毛竅中八萬四千云蒸雨散無始以來諸病自除諸障自滅定能生慧自然明悟譬如盲人忽然有眼此時何用求人指路是故老人言盡於此小周天法先將身心澄定面東趺坐平坐亦可但前膝不可低腎子不可著物呼吸和平以手作三昧印掐無名指右掌加左掌上按於臍下叩齒三十六通以集心神赤龍攪海內外三十六遍赤龍舌也內外齒內外也雙目隨舌運轉舌抵上齶靜心數息三百六十周天畢待神水滿漱津數遍用四字訣攝提穀道舌抵上齶目閉上視鼻吸莫呼從任脈撮過穀道到尾閭以意運送徐徐上夾脊中關漸漸速些閉目上視鼻吸莫呼撞過玉枕頸上腦後骨將目往前一忍直轉崑崙頭頂倒下鵲橋舌分津送下重樓入離宮心也而至氣海臍下穴也略定一定復用前法連行三次口中之津分三次嚥下所謂天河水逆流也靜坐片時將手左右擦丹田一百八下連臍抱住放手時將衣被臍腹間圍住勿令風入古所謂養得丹田暖暖熱此是神仙真妙法次將大指背擦熱拭目十四遍去心火擦鼻三十六遍潤肺擦耳十四遍補腎擦面十四遍健脾兩手掩耳鳴天鼓徐徐將手往上即朝天揖如是者三徐徐呼出濁氣四五口鼻收清氣兩手抱肩移筋換骨數遍擦玉枕關二十四下擦腰眼即腎堂一百八下擦足心即湧泉各一百八下謂之一周久久行之精神強旺百病不生長生耐老清心說夫既行運氣功夫又加以動功再及靜功則胸膈舒泰氣血流行宿疾沉疴為之頓去但此心不清或預料將來或追悔已往或為錢財或為聲色或為意氣種種妄想纏綿糾結雜亂其心則欲火內生氣血復乖前功盡廢矣病者於是時當自想曰曏者我病篤時九死一生幾為塵下之土無復立人間世矣今幸得再生此餘生也聲色貨利皆身外之餘物至於意氣爭執尤覺無謂兒孫自有兒孫福更無纖毫牽掛一切世味淡然漠然但得自在逍遙隨緣度日足矣即此卻病之方即此延年之藥又曰錢財所以養生若貪取之必致傷生聲色所以悅心若過戀之必致損身意氣所以自高若爭競之反取自辱酒肉所以適口若沉酣之反能為害故曰酒色財氣傷人物多少英雄被他惑若能打退四凶魔便是九霄雲外客又曰一人之身一國之象也胸臆之間猶宮府焉肢體之位猶郊境焉骨節之分猶四衢焉血脈之道猶百川焉神猶君也精猶臣也氣猶民也故至人能理其身猶人君能治其國愛民安國愛氣全身民弊國亡氣衰身謝故善養生者先除六害一曰薄名位二曰廉貨財三曰少色欲四曰減滋味五曰屏虛妄六曰除嫉妬如六者尚存不能自禁即真經空念其如衰朽安得挽乎修養余言孫真人曰人年四十以上勿食瀉藥人有所怒血氣未定若交合令人發癰疽遠行疲乏入房成五勞少子忍小便膝冷成淋忍大便成氣痔水銀不可近陰鹿豕二脂不可近陰皆令人陰痿養生者發宜多梳面宜常擦目宜常運耳宜常筌舌宜抵齶齒宜常叩津宜常咽背宜常暖胸宜常護腹宜常摩穀道宜常撮足宜常擦湧泉一身皮膚宜常干浴大小便宜咬齒勿言又須省多言省筆札省交遊省妄想所一息不可省者居敬養心耳飢勿過飽飽食成癖病飽食夜臥失覆多霍亂時病瘥勿食膾成痢食膾勿食乳酪成蟲病食兔肉勿食姜成霍亂勿食父母本命所屬之肉欲令壽永勿食自己本命所屬肉欲令魂魄安寧勿食一切腦恐損神勿食盤面上眾人先用物成結氣凡食畢漱口數過令人齒固凡食皆熟勝生少勝多春天不可衣薄令傷寒霍亂濕衣汗衣勿著令發瘡瘍夜臥頭勿向北並勿近火爐恐損目夜臥常習閉口開則氣耗又恐異氣入口慎之凡入夢魘不得燃燈喚之亦不可近而急喚夜夢惡勿說旦起口含涼水向東噀之咒曰惡夢著草木好夢成珠玉即解凡夢善惡勿說獲吉居處切防令有小隙小隙之風最劣勿忍急避凡在家在外忽遇大風大雨震雷昏霧必是諸煞鬼神經過宜入室閉戶燒香恭默過後乃出否則恐招損獲咎瑣碎錄云臥處不可以首近火恐傷腦亦不可當風恐患頭風背受風則嗽肩受風則臂疼善調攝者雖盛暑不當風及坐臥露下又云戒酒後語忌食時嗔忍難忍事怒不明人口腹不節致病之因念慮不正殺身之本又曰酒不顧身色不顧病財不顧親氣不顧命當其未值孰不明知亦能勸人及到自臨其境仍復昏迷當此之時再思猛省楊廉夫集有路逢三叟詞云上臾前致詞大道抱天全中叟前致詞寒暑每節宣下叟前致詞百歲半單眠嘗見後山詩中一詞亦此意蓋出應璩璩詩曰昔有行道人陌上見三叟年各百歲余相與鋤禾莠往前問三叟何以得此壽上叟前致詞室內姬粗醜二叟前致詞量腹節所受下叟前致詞夜臥不覆首要哉三叟言所以能長久保養之道無過在於平日飲食男女之間能自節愛即是省身修德若恣肆無忌即是過惡潛滋暗長甚則疾病應之雖因風寒外感或緣內傷七情實由人違犯聖教以致魂魄相離精神失守肌體空疏百骸不遂風寒邪氣得以中入若有德者雖處幽暗不敢為非雖居榮祿不敢為惡量體而衣隨分而食雖富貴不敢恣欲雖貧賤不敢強求是以外無殘暴內無疾病也蓋心內澄則真神守其位氣內定則邪穢去其身行欺詐則神昏行爭競則神沮輕侮於人必減算殺害於物必傷年行一善則神魂歡作一惡則心氣亂人能寬泰自居恬淡自守則形神安靜災病不生福壽永昌由茲伊始人之遘疾者始於心忘其身而病生繼則過患其身而病不去忘身者在康強時不擇味而飽不擇風而裸不擇時而色不擇醒而醉不擇里而趨不擇性而喜怒哀樂故病乘吾所弗備即至也悔無及夫人之涕唾便溺也必有氣焉以充之而後出草木之華鳥獸之羽毛也亦必有脈焉以貫之而後榮是故氣脈之貴乎養也已上諸仙垂訓皆卻病良方延年妙快雖非金丹大旨然由此而進未嘗不可以入道也嗣有大周天三煉要旨容圖災木就正宇內
